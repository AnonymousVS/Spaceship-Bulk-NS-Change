# ============================================================
# Spaceship Bulk NS Change - Configuration
# ============================================================
# Copy this file to config.conf and fill in your credentials:
#   cp config.conf.example config.conf
# ============================================================

# --- Spaceship API Credentials ---
# สร้างได้ที่: https://www.spaceship.com/application/api-manager/
# Permissions ที่ต้องเปิด: domains:read, domains:write
SPACESHIP_API_KEY=""
SPACESHIP_API_SECRET=""

# --- Nameservers ที่ต้องการเปลี่ยนไป ---
NS1="aria.ns.cloudflare.com"
NS2="bob.ns.cloudflare.com"

# --- Delay ระหว่างแต่ละโดเมน (วินาที) ---
# แนะนำ 2 วินาที ป้องกัน rate limit
# ถ้าโดเมนเยอะ 100+ ตัว ใส่ 3 เพื่อความปลอดภัย
DELAY=2

# --- Telegram แจ้งเตือน (optional - ไม่ใส่ = ไม่แจ้ง) ---
TG_BOT_TOKEN=""
TG_CHAT_ID=""
